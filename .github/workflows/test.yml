name: Test Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-self-hosted-mode:
    name: Test with ClickHouse ${{ matrix.clickhouse-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        clickhouse-version: ['24.3', '24.8']
    env:
      CH_CI_ADMIN_PASSWORD: ci_admin_pass
      CH_CI_MIGRATION_PASSWORD: ci_test_password
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ch-migrate from source
        run: pip install "clickhouse-alembic @ git+https://github.com/DRYCodeWorks/clickhouse-migrate.git"

      - name: Initialize test project
        run: |
          mkdir -p test-project && cd test-project
          ch-migrate init .

          cat > config.yaml << 'EOF'
          project:
            name: ci_test

          defaults:
            port: 8123
            secure: false
            admin_user: default

          environments:
            ci:
              host: localhost
              database: ci_test_db
              migration_user: ci_migration
          EOF

      - name: Start ClickHouse server
        run: |
          docker run -d \
            --name ch-migrate-ci \
            -p 8123:8123 \
            -e CLICKHOUSE_DB=default \
            -e CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 \
            -e CLICKHOUSE_PASSWORD=ci_admin_pass \
            clickhouse/clickhouse-server:${{ matrix.clickhouse-version }}

      - name: Wait for ClickHouse ready
        run: |
          for i in $(seq 1 30); do
            if curl -s "http://localhost:8123/ping" 2>/dev/null | grep -q "Ok"; then
              echo "ClickHouse is ready."
              exit 0
            fi
            sleep 1
          done
          echo "::error::ClickHouse failed to start within 30 seconds"
          docker logs ch-migrate-ci
          exit 1

      - name: Bootstrap database
        working-directory: test-project
        run: ch-migrate bootstrap ci

      - name: Run migrations
        working-directory: test-project
        run: ch-migrate up ci

      - name: Lint migrations (static)
        working-directory: test-project
        run: |
          if ch-migrate lint --help >/dev/null 2>&1; then
            ch-migrate lint
          else
            echo "ch-migrate lint not available in this version, skipping"
          fi

      - name: Verify ClickHouse state
        run: |
          curl -s "http://default:ci_admin_pass@localhost:8123/?query=SELECT+version()" | head -1
          curl -s "http://default:ci_admin_pass@localhost:8123/?query=SHOW+DATABASES" | grep ci_test_db

      - name: Cleanup
        if: always()
        run: docker rm -f ch-migrate-ci || true

  test-composite-action:
    name: Test composite action end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Initialize project in repo root
        run: |
          pip install "clickhouse-alembic @ git+https://github.com/DRYCodeWorks/clickhouse-migrate.git"
          ch-migrate init .

          cat > config.yaml << 'EOF'
          project:
            name: action_test

          defaults:
            port: 8123
            secure: false
            admin_user: default

          environments:
            ci:
              host: localhost
              database: action_test_db
              migration_user: action_migration
          EOF

      - name: Run ch-migrate action
        uses: ./
        with:
          environment: ci
          clickhouse-version: '24.8'
          lint: 'true'
          bootstrap: 'true'
          migrate: 'true'
          ch-migrate-version: 'clickhouse-alembic @ git+https://github.com/DRYCodeWorks/clickhouse-migrate.git'

      - name: Verify
        run: |
          curl -s "http://default:ci_admin_pass@localhost:8123/?query=SHOW+DATABASES" | grep action_test_db

      - name: Cleanup
        if: always()
        run: docker rm -f ch-migrate-ci || true
